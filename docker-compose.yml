services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: urlshortener
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  # kafka:
  #   image: confluentinc/cp-kafka:7.6.0
  #   (uncomment if you need Kafka for high-throughput multi-consumer pipelines)

volumes:
  postgres_data:
