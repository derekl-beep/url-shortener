<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URL Shortener</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 2.5rem;
      width: 100%;
      max-width: 520px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #fff;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      font-size: 0.875rem;
      color: #666;
      margin-bottom: 2rem;
    }

    .input-row {
      display: flex;
      gap: 0.5rem;
    }

    input[type="url"] {
      flex: 1;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 0.65rem 0.9rem;
      font-size: 0.9rem;
      color: #e8e8e8;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="url"]:focus {
      border-color: #4f4f4f;
    }

    input[type="url"]::placeholder {
      color: #444;
    }

    button.shorten-btn {
      background: #fff;
      color: #0f0f0f;
      border: none;
      border-radius: 8px;
      padding: 0.65rem 1.1rem;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, opacity 0.15s;
    }

    button.shorten-btn:hover { background: #e0e0e0; }
    button.shorten-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .error {
      margin-top: 1rem;
      font-size: 0.825rem;
      color: #f87171;
    }

    .result {
      margin-top: 1.25rem;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      animation: fadein 0.2s ease;
    }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result a {
      color: #a78bfa;
      font-size: 0.9rem;
      text-decoration: none;
      word-break: break-all;
    }

    .result a:hover { text-decoration: underline; }

    button.copy-btn {
      background: #2a2a2a;
      color: #ccc;
      border: none;
      border-radius: 6px;
      padding: 0.4rem 0.75rem;
      font-size: 0.8rem;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s;
    }

    button.copy-btn:hover { background: #333; color: #fff; }
    button.copy-btn.copied { background: #166534; color: #86efac; }
  </style>
</head>
<body>
  <div class="card">
    <h1>URL Shortener</h1>
    <p class="subtitle">Paste a long URL to get a short link.</p>

    <form id="form">
      <div class="input-row">
        <input
          id="url-input"
          type="url"
          placeholder="https://example.com/very/long/url"
          autocomplete="off"
          required
        />
        <button class="shorten-btn" type="submit" id="submit-btn">Shorten</button>
      </div>
    </form>

    <p class="error" id="error" hidden></p>
    <div class="result" id="result" hidden>
      <a id="short-link" href="" target="_blank" rel="noopener"></a>
      <button class="copy-btn" id="copy-btn" type="button">Copy</button>
    </div>
  </div>

  <script>
    const form      = document.getElementById('form');
    const input     = document.getElementById('url-input');
    const submitBtn = document.getElementById('submit-btn');
    const errorEl   = document.getElementById('error');
    const resultEl  = document.getElementById('result');
    const linkEl    = document.getElementById('short-link');
    const copyBtn   = document.getElementById('copy-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const url = input.value.trim();
      if (!url) return;

      errorEl.hidden = true;
      resultEl.hidden = true;
      submitBtn.disabled = true;
      submitBtn.textContent = 'Shortening…';

      try {
        const res = await fetch('/urls', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url }),
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data || 'Something went wrong');
        }

        linkEl.href        = data.short_url;
        linkEl.textContent = data.short_url;
        resultEl.hidden    = false;
        input.value        = '';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.hidden = false;
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Shorten';
      }
    });

    copyBtn.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(linkEl.href);
        copyBtn.textContent = 'Copied!';
        copyBtn.classList.add('copied');
        setTimeout(() => {
          copyBtn.textContent = 'Copy';
          copyBtn.classList.remove('copied');
        }, 2000);
      } catch {
        copyBtn.textContent = 'Failed';
      }
    });
  </script>
</body>
</html>
